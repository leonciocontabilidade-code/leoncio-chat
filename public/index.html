<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leoncio Chat - Workplace Communication</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #fff;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== AUTH PAGE ===== */
    .auth-page {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .auth-container {
      background: white;
      padding: 50px;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 420px;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .auth-header h1 {
      font-size: 28px;
      color: #2c3e50;
      margin-bottom: 10px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #2c3e50;
      font-weight: 600;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .auth-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .auth-btn:hover {
      transform: translateY(-2px);
    }

    .auth-toggle {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }

    .auth-toggle a {
      color: #667eea;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
    }

    .auth-error {
      display: none;
      background: #ffe6e6;
      color: #c0392b;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
    }

    /* ===== SLACK-LIKE LAYOUT ===== */
    .chat-page {
      display: flex;
      height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      width: 260px;
      background: #3f0e40;
      color: white;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2a252e;
    }

    .workspace-header {
      padding: 16px;
      border-bottom: 1px solid #2a252e;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .workspace-logo {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      font-size: 18px;
      flex-shrink: 0;
    }

    .workspace-name {
      flex: 1;
    }

    .workspace-name h2 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .workspace-name p {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
    }

    .sidebar-section {
      padding: 0;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .sidebar-section-title {
      padding: 16px 16px 8px;
      font-size: 12px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-section-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      font-size: 18px;
      padding: 0;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar-section-btn:hover {
      color: white;
    }

    .channel-item, .user-item {
      padding: 8px 16px;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
      border-left: 3px solid transparent;
    }

    .channel-item:hover, .user-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .channel-item.active, .user-item.active {
      background: rgba(102, 126, 234, 0.2);
      color: white;
      border-left-color: #667eea;
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid #2a252e;
      display: flex;
      gap: 8px;
    }

    .user-profile-mini {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      cursor: pointer;
      padding: 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .user-profile-mini:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .user-avatar-mini {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }

    .user-info-mini {
      flex: 1;
      min-width: 0;
    }

    .user-info-mini-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-info-mini-status {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* MAIN CONTENT */
    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
    }

    /* CHANNEL HEADER */
    .channel-header {
      padding: 16px 24px;
      border-bottom: 1px solid #eaeaea;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      background: white;
    }

    .channel-header-left h1 {
      font-size: 24px;
      color: #2c3e50;
      margin-bottom: 4px;
    }

    .channel-header-left p {
      font-size: 13px;
      color: #7f8c8d;
    }

    .channel-header-right {
      display: flex;
      gap: 16px;
      align-items: center;
      font-size: 13px;
      color: #7f8c8d;
    }

    /* MESSAGES AREA */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
    }

    .message {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .message-body {
      flex: 1;
    }

    .message-header {
      display: flex;
      gap: 8px;
      align-items: baseline;
      margin-bottom: 4px;
    }

    .message-author {
      font-weight: 600;
      color: #2c3e50;
      font-size: 14px;
    }

    .message-time {
      font-size: 12px;
      color: #95a5a6;
    }

    .message-text {
      color: #2c3e50;
      line-height: 1.5;
      word-break: break-word;
      font-size: 14px;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      align-items: center;
      margin: 10px 0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #bdc3c7;
      animation: bounce 1.4s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(1); }
      40% { transform: scale(1.3); }
    }

    /* INPUT AREA */
    .input-area {
      padding: 20px 24px;
      border-top: 1px solid #eaeaea;
      display: flex;
      gap: 12px;
      background: white;
    }

    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.2s;
      font-family: inherit;
    }

    .input-area input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .send-btn {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: transform 0.2s;
    }

    .send-btn:hover {
      transform: translateY(-2px);
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      padding: 40px;
      border-radius: 15px;
      width: 90%;
      max-width: 450px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-header h2 {
      color: #2c3e50;
      font-size: 22px;
      margin-bottom: 20px;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 30px;
    }

    .btn-cancel, .btn-save {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-cancel {
      background: #ecf0f1;
      color: #2c3e50;
    }

    .btn-cancel:hover {
      background: #d5dbdd;
    }

    .btn-save {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-save:hover {
      transform: translateY(-2px);
    }

    /* NOTICE ALERT BANNER */
    #noticeAlertBanner {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px 24px;
      border-bottom: 2px solid #5568d3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
    }

    #noticeAlertBanner button {
      background: white;
      color: #667eea;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <!-- AUTH PAGE -->
  <div id="authPage" class="auth-page">
    <div class="auth-container">
      <div class="auth-header">
        <h1 id="authTitle">Bem-vindo</h1>
        <p>Acesse sua conta</p>
      </div>

      <div id="authError" class="auth-error"></div>

      <form id="authForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="emailInput" placeholder="seu@email.com" required />
        </div>

        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="passwordInput" placeholder="••••••••" required />
        </div>

        <div id="nameGroupContainer" class="form-group" style="display: none;">
          <label>Nome</label>
          <input type="text" id="nameInput" placeholder="Seu nome" />
        </div>

        <button type="submit" class="auth-btn" id="authBtn">Entrar</button>
      </form>

      <div class="auth-toggle">
        <span id="toggleText">Não tem conta? </span>
        <a id="toggleAuthBtn">Criar conta</a>
      </div>
    </div>
  </div>

  <!-- CHAT PAGE -->
  <div id="chatPage" class="chat-page" style="display: none;">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <!-- Workspace Header -->
      <div class="workspace-header">
        <div class="workspace-logo">L</div>
        <div class="workspace-name">
          <h2>Leoncio</h2>
          <p id="companyCnpjThumb">00.000.000/0000-00</p>
        </div>
      </div>

      <!-- Sections -->
      <div class="sidebar-section">
        <!-- Channels -->
        <div style="flex: 1; overflow-y: auto;">
          <div class="sidebar-section-title">
            Canais
            <button class="sidebar-section-btn">+</button>
          </div>
          <div id="channelsList"></div>
        </div>

        <!-- Direct Messages -->
        <div style="flex: 1; overflow-y: auto; border-top: 1px solid #2a252e;">
          <div class="sidebar-section-title">
            Diretas
            <button class="sidebar-section-btn">+</button>
          </div>
          <div id="usersList"></div>
        </div>
      </div>

      <!-- User Footer -->
      <div class="sidebar-footer">
        <div class="user-profile-mini" id="userProfileBtn">
          <img id="userAvatarThumb" src="" alt="Avatar" class="user-avatar-mini" />
          <div class="user-info-mini">
            <div class="user-info-mini-name" id="userName"></div>
            <div class="user-info-mini-status" id="userContact"></div>
          </div>
        </div>
        <button id="logoutBtn" style="background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer; font-size: 18px; padding: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 6px;" title="Sair">🚪</button>
      </div>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="main-container">
      <!-- Notice Alert Banner -->
      <div id="noticeAlertBanner" style="display: none;">
        <div style="flex: 1;">
          <strong>📢 Novo Aviso:</strong> <span id="noticeAlertTitle"></span>
        </div>
        <button onclick="switchToNotices()">Ver Aviso</button>
        <button onclick="closeNoticeAlert()">✕</button>
      </div>

      <!-- Channel Header -->
      <div class="channel-header">
        <div class="channel-header-left">
          <h1 id="currentChannel">#geral</h1>
          <p id="currentChannelDesc">Conversa geral da equipe</p>
        </div>
        <div class="channel-header-right">
          <span style="display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #27ae60; margin-right: 4px;"></span>
          <span id="userCount">Carregando...</span>
        </div>
      </div>

      <!-- Messages Area -->
      <div class="messages-area" id="messagesArea"></div>

      <!-- Input Area -->
      <div class="input-area">
        <input
          type="text"
          id="messageInput"
          placeholder="Escreva uma mensagem..."
          autocomplete="off"
        />
        <button class="send-btn" id="sendBtn">Enviar</button>
      </div>
    </div>
  </div>

  <!-- PROFILE MODAL -->
  <div id="profileModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Editar Perfil</h2>
      </div>

      <div class="form-group">
        <label>Nome</label>
        <input type="text" id="editName" placeholder="Seu nome" />
      </div>

      <div class="form-group">
        <label>Contato (WhatsApp)</label>
        <input type="text" id="editContact" placeholder="+55 11 99999-9999" />
      </div>

      <div class="form-group">
        <label>Bio</label>
        <input type="text" id="editBio" placeholder="Seu cargo" />
      </div>

      <div class="modal-buttons">
        <button type="button" class="btn-cancel" id="cancelProfileBtn">Cancelar</button>
        <button type="button" class="btn-save" id="saveProfileBtn">Salvar</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // State
    let currentUser = null;
    let currentChannel = 'geral';
    let isRegistering = false;
    let socket = null;
    let messages = [];
    let notices = [];
    let teamStatus = [];

    // DOM Elements
    const authPage = document.getElementById('authPage');
    const chatPage = document.getElementById('chatPage');
    const authForm = document.getElementById('authForm');
    const authBtn = document.getElementById('authBtn');
    const toggleAuthBtn = document.getElementById('toggleAuthBtn');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const nameInput = document.getElementById('nameInput');
    const nameGroupContainer = document.getElementById('nameGroupContainer');
    const authTitle = document.getElementById('authTitle');
    const toggleText = document.getElementById('toggleText');
    const authError = document.getElementById('authError');

    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const messagesArea = document.getElementById('messagesArea');
    const channelsList = document.getElementById('channelsList');
    const currentChannelDisplay = document.getElementById('currentChannel');
    const userCount = document.getElementById('userCount');

    const userProfileBtn = document.getElementById('userProfileBtn');
    const userName = document.getElementById('userName');
    const userContact = document.getElementById('userContact');
    const userAvatarThumb = document.getElementById('userAvatarThumb');
    const logoutBtn = document.getElementById('logoutBtn');

    const profileModal = document.getElementById('profileModal');
    const editName = document.getElementById('editName');
    const editContact = document.getElementById('editContact');
    const editBio = document.getElementById('editBio');
    const cancelProfileBtn = document.getElementById('cancelProfileBtn');
    const saveProfileBtn = document.getElementById('saveProfileBtn');

    const noticeAlertBanner = document.getElementById('noticeAlertBanner');
    const noticeAlertTitle = document.getElementById('noticeAlertTitle');

    // Toggle Auth
    toggleAuthBtn.addEventListener('click', (e) => {
      e.preventDefault();
      isRegistering = !isRegistering;
      if (isRegistering) {
        authTitle.textContent = 'Criar Conta';
        toggleText.textContent = 'Já tem conta? ';
        toggleAuthBtn.textContent = 'Fazer Login';
        authBtn.textContent = 'Registrar';
        nameGroupContainer.style.display = 'block';
        nameInput.required = true;
      } else {
        authTitle.textContent = 'Bem-vindo';
        toggleText.textContent = 'Não tem conta? ';
        toggleAuthBtn.textContent = 'Criar conta';
        authBtn.textContent = 'Entrar';
        nameGroupContainer.style.display = 'none';
        nameInput.required = false;
      }
      authError.style.display = 'none';
    });

    // Auth Form
    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value;
      const password = passwordInput.value;
      const name = nameInput.value;

      try {
        const endpoint = isRegistering ? '/api/register' : '/api/login';
        const body = { email, password };
        if (isRegistering) body.name = name;

        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const data = await response.json();

        if (!response.ok) {
          authError.textContent = data.error;
          authError.style.display = 'block';
          return;
        }

        localStorage.setItem('token', data.token);
        currentUser = data.user;
        initializeChat();
      } catch (error) {
        authError.textContent = 'Erro: ' + error.message;
        authError.style.display = 'block';
      }
    });

    // Initialize Chat
    async function initializeChat() {
      authPage.style.display = 'none';
      chatPage.style.display = 'flex';

      updateUserProfile();

      socket = io({
        reconnection: true,
        reconnectionDelay: 1000,
        reconnectionDelayMax: 5000,
        reconnectionAttempts: 5,
        transports: ['websocket', 'polling'],
        upgrade: true
      });
      socket.on('connect', () => {
        socket.emit('user_join', currentUser);
      });

      socket.on('user_connected', (data) => {
        userCount.textContent = `${data.count} usuários online`;
      });

      socket.on('user_disconnected', (data) => {
        userCount.textContent = `${data.count} usuários online`;
      });

      socket.on('new_message', (message) => {
        if (message.channel === currentChannel) {
          displayMessage(message);
        }
      });

      socket.on('user_typing', (data) => {
        showTypingIndicator(data.name);
      });

      loadChannels();
      loadMessages();
    }

    function updateUserProfile() {
      userName.textContent = currentUser.name;
      userContact.textContent = currentUser.contact || 'Sem contato';
      userAvatarThumb.src = currentUser.avatar;
    }

    // Load Channels
    async function loadChannels() {
      try {
        const response = await fetch('/api/channels');
        const channels = await response.json();

        channelsList.innerHTML = channels
          .map((ch) => `
            <div class="channel-item ${ch.name === currentChannel ? 'active' : ''}"
                 onclick="switchChannel('${ch.name}')">
              # ${ch.name}
            </div>
          `)
          .join('');
      } catch (error) {
        console.error('Erro ao carregar canais:', error);
      }
    }

    function switchChannel(channel) {
      currentChannel = channel;
      currentChannelDisplay.textContent = '#' + channel;
      document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
      event.target.classList.add('active');
      loadMessages();
    }

    // Load Messages
    async function loadMessages() {
      try {
        const response = await fetch(`/api/messages/${currentChannel}`);
        messages = await response.json();
        messagesArea.innerHTML = '';
        messages.forEach(displayMessage);
        messagesArea.scrollTop = messagesArea.scrollHeight;
      } catch (error) {
        console.error('Erro ao carregar mensagens:', error);
      }
    }

    function displayMessage(message) {
      const messageEl = document.createElement('div');
      messageEl.className = 'message';
      const time = new Date(message.timestamp).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      messageEl.innerHTML = `
        <img src="${message.avatar}" alt="Avatar" class="message-avatar" />
        <div class="message-body">
          <div class="message-header">
            <span class="message-author">${message.name}</span>
            <span class="message-time">${time}</span>
          </div>
          <div class="message-text">${message.text}</div>
        </div>
      `;
      messagesArea.appendChild(messageEl);
      messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    // Send Message
    sendBtn.addEventListener('click', () => {
      const text = messageInput.value.trim();
      if (!text) return;

      socket.emit('send_message', {
        text,
        channel: currentChannel,
        email: currentUser.email,
        name: currentUser.name
      });

      messageInput.value = '';
    });

    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendBtn.click();
    });

    // Typing indicator
    messageInput.addEventListener('input', () => {
      socket.emit('typing', { channel: currentChannel, name: currentUser.name });
    });

    function showTypingIndicator(name) {
      if (messagesArea.querySelector('.typing-indicator')) return;
      const typingEl = document.createElement('div');
      typingEl.className = 'typing-indicator';
      typingEl.innerHTML = `<span style="color: #95a5a6; font-size: 12px;">${name} está digitando</span><div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
      messagesArea.appendChild(typingEl);
      setTimeout(() => typingEl.remove(), 3000);
    }

    // Profile Modal
    userProfileBtn.addEventListener('click', () => {
      editName.value = currentUser.name;
      editContact.value = currentUser.contact || '';
      editBio.value = currentUser.bio || '';
      profileModal.classList.add('active');
    });

    cancelProfileBtn.addEventListener('click', () => {
      profileModal.classList.remove('active');
    });

    saveProfileBtn.addEventListener('click', async () => {
      try {
        const response = await fetch('/api/profile', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: currentUser.email,
            name: editName.value,
            contact: editContact.value,
            bio: editBio.value,
            avatar: currentUser.avatar
          })
        });

        if (!response.ok) throw new Error('Erro ao salvar perfil');

        const userData = await response.json();
        currentUser = { ...currentUser, ...userData.user };
        updateUserProfile();
        profileModal.classList.remove('active');
      } catch (error) {
        alert('Erro: ' + error.message);
      }
    });

    // Logout
    logoutBtn.addEventListener('click', () => {
      localStorage.removeItem('token');
      location.reload();
    });

    // Notice Alert
    function showNoticeAlert(notice) {
      if (currentUser.email === notice.email) return;
      noticeAlertTitle.textContent = notice.title;
      noticeAlertBanner.style.display = 'flex';
      setTimeout(() => closeNoticeAlert(), 10000);
    }

    function closeNoticeAlert() {
      noticeAlertBanner.style.display = 'none';
    }

    function switchToNotices() {
      switchChannel('avisos');
      closeNoticeAlert();
    }

    // Check auth on load
    window.addEventListener('load', async () => {
      const token = localStorage.getItem('token');
      if (token) {
        try {
          const response = await fetch('/api/profile', {
            headers: { Authorization: `Bearer ${token}` }
          });
          if (response.ok) {
            currentUser = (await response.json()).user;
            initializeChat();
          }
        } catch (error) {
          console.error('Erro ao verificar autenticação:', error);
        }
      }
    });
  </script>
</body>
</html>
